<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>MFC – Model Click View</title>

<style>
  svg g.edge {
    transition: opacity 0.2s ease;
  }

  svg g.node {
    cursor: pointer;
  }
</style>
</head>

<body>

<h3>Click a MODEL to show only that model’s path (click background to reset)</h3>

<object id="mfc"
        type="image/svg+xml"
        data="test.svg"
        width="100%"
        height="900px">
</object>

<script>
document.getElementById("mfc").addEventListener("load", function () {
  const svg = this.contentDocument;

  const edges = svg.querySelectorAll("g.edge");
  const nodes = svg.querySelectorAll("g.node");

  nodes.forEach(node => {
    node.addEventListener("click", function (e) {
      e.stopPropagation();

      // Graphviz sets node name here
      const modelName = this.getAttribute("data-name");
      if (!modelName) return;

      // SAME sanitization logic as Python
      const modelId = modelName.replace(/[^a-zA-Z0-9]/g, "_");

      // Dim all edges
      edges.forEach(edge => {
        edge.style.opacity = "0.08";
      });

      // Highlight only edges of this model
      svg.querySelectorAll(`g.edge[model="${modelId}"]`)
         .forEach(edge => {
           edge.style.opacity = "1";
         });
    });
  });

  // Click on background resets everything
  svg.addEventListener("click", function () {
    edges.forEach(edge => {
      edge.style.opacity = "1";
    });
  });
});
</script>

</body>
</html>
